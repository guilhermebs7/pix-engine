name: Java CI com Maven e PostgreSQL (Engine PIX)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 1. Aqui nós criamos o banco de dados temporário no Docker do GitHub
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pix_db_test
          POSTGRES_USER: pix_user_test
          POSTGRES_PASSWORD: pix_password_test
        ports:
          - 5432:5432
        # Garante que o GitHub só vai iniciar os testes quando o banco estiver 100% pronto
        options: >-
          --health-cmd "pg_isready -U pix_user_test -d pix_db_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Baixar o codigo fonte
        uses: actions/checkout@v4

      - name: Configurar o JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 2. Executamos o build passando as variáveis de conexão com o banco do GitHub
      - name: Compilar e Rodar os Testes
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/pix_db_test
          POSTGRES_USER: pix_user_test
          POSTGRES_PASSWORD: pix_password_test
        run: mvn -B clean verify